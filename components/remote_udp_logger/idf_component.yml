version: "0.1.1"
description: "Mirror ESP-IDF logs to UDP and prefix log lines with a device id for wireless debugging."
license: "MIT"
maintainers:
  - "Li Ruirui <liruirui@x-bell.com>"
url: "https://github.com/XianJieLianMeng/remote_udp_logger"
repository: "https://github.com/XianJieLianMeng/remote_udp_logger.git"
documentation: "https://github.com/XianJieLianMeng/remote_udp_logger#readme"
issues: "https://github.com/XianJieLianMeng/remote_udp_logger/issues"
tags:
  - logging
  - udp
  - wifi
  - debug
  - diagnostics
dependencies:
  idf: ">=5.0"
examples:
  - path: "examples/basic"
files:
  exclude:
    - "build/**/*"
    - "dist/**/*"
    - "managed_components/**/*"
    - "sdkconfig"
    - "sdkconfig.old"
    - "**/dependencies.lock"
    - "**/__pycache__/**/*"
