version: "0.1.0"
description: "Mirror ESP-IDF logs to UDP and prefix log lines with a device id for wireless debugging."
license: "MIT"
tags:
  - logging
  - udp
  - wifi
  - debug
  - diagnostics
dependencies:
  idf: ">=5.0"
files:
  exclude:
    - "build/**/*"
    - "dist/**/*"
    - "managed_components/**/*"
    - "sdkconfig"
    - "sdkconfig.old"
    - "**/__pycache__/**/*"

